services:
  django:
    build:
      context: ./django
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    #command: sleep infinity
    volumes:
      - ./django:/app                    # バインドマウント：コード変更を即反映
    ports:
      - "8000:8000"
    env_file: ./django/.env.development
    tty: true
    stdin_open: true
    restart: unless-stopped
