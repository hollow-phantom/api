upstream django {
    server django:8000;
}

# HTTP → HTTPS リダイレクト + Let's Encrypt認証用
server {
    listen 80;
    server_name o-oka.co.jp;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name o-oka.co.jp;

    ssl_certificate /etc/letsencrypt/live/o-oka.co.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/o-oka.co.jp/privkey.pem;

    # フロントエンド静的ファイル配信
    location / {
        root /opt/system/apps;
        try_files $uri $uri/ =404;
    }

    # React APP
    location /apps/ {
        alias /opt/system/apps/;
    }

    # DRF API
    location /api/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # collectstatic の成果物
    location /static/ {
        alias /opt/system/api/django/staticfiles/;
    }
}
