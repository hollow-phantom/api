upstream django {
    server django:8000;    # サービス名を django に変更
}

server {
    listen 80;

    # フロントエンド静的ファイル配信
    location / {
        root /opt/system/apps;
        try_files $uri $uri/ =404;
    }

    # DRF API
    location /api/ {
        proxy_pass http://django/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://django/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # collectstatic の成果物
    location /static/ {
        alias /opt/system/api/django/staticfiles/;
    }
}
